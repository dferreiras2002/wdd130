<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact our rafting company for reservations and questions">
    <meta name="author" content="Diego Ferreira">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

<header>
   <header>
    <img src="images/logo.png" alt="Rafting Logo">
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="trips.html">Trips</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>

  <h1>Contact Us</h1>

  <section>
    <h2>Company Information</h2>
    <p>Address: Palmas, Brazil</p>
    <p>Phone: (63) 99999-9999</p>
    <p>Email: contact@rafting.com</p>

    <iframe 
      src="https://www.google.com/maps?q=Palmas%20Brazil&output=embed"
      width="100%" height="300">
    </iframe>
  </section>

  <section>
    <h2>Our Team</h2>

    <figure>
      <img src="images/happy.jpg" alt="Employee">
      <figcaption>Guide</figcaption>
    </figure>

    <figure>
      <img src="images/hero.jpg" alt="Employee">
      <figcaption>Manager</figcaption>
    </figure>

    <figure>
      <img src="images/happy.jpg" alt="Employee">
      <figcaption>Support</figcaption>
    </figure>

  </section>

  <section>
    <h2>Send Us a Message</h2>

    <form>

      <label>Name:</label>
      <input type="text" required>

      <label>Email:</label>
      <input type="email" required>

      <p>Purpose:</p>

      <label><input type="radio" name="purpose"> General Inquiry</label>
      <label><input type="radio" name="purpose"> Reservation Question</label>
      <label><input type="radio" name="purpose"> Website Suggestion</label>

      <label>Message:</label>
      <textarea></textarea>

      <label>
        <input type="checkbox">
        Please subscribe me to the monthly newsletter
      </label>

      <button type="submit">Send Message</button>

    </form>
  </section>

</main>


<footer>
  <p>© 2026 White Water Rafting | Diego Ferreira</p>

  <div class="social">
    <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
    <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
    <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
  </div>
</footer>

</body>
</html>
